{% load static %}

<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel= "stylesheet" href="{% static 'style.css' %}">
        {% block extra_css %}{% endblock %}
        <link rel="shortcut icon" href="{% static 'favicon/favicon.ico' %}">
        <title>HCAI project</title>
        <style></style>
    </head>
    <body>
        <header class="site-header">
            <a class="site-brand" href="{% url 'home:index' %}">
                <img src="{% static 'images/tuhh-logo.svg' %}" alt="TUHH logo" class="site-logo">
                <span>Human-Centric AI PBL</span>
            </a>
            <span class="site-context">
                {% block site_context %}Course project hub{% endblock %}
            </span>
        </header>
        <main class="grid-parent">
            {% block content %}
            {%  endblock %}
        </main>

        {% block script %}
        {% endblock script %}
    </body>
</html>
